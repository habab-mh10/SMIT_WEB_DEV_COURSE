<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Tags</title>
</head>
<body>
    <h1>HTML Images</h1>
    <p>Images can be added to an HTML page using the <code>&lt;img&gt;</code> tag. The <code>src</code> attribute specifies the path to the image, and the <code>alt</code> attribute provides alternative text for the image if it cannot be displayed.</p>
    <h2>Example of an Image Tag</h2>
    <img src="./flowers.jpg" 
    title="mountain"
    width="1000">
</body>
</html>
