<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time table practice</title>
</head>
<style>
    table, th, td{
        border: 1px solid black;
        border-collapse: collapse;
        padding: 20px;
        text-align: center;
    }
</style>
<body>
    <h1>Time Table</h1>
    <table border="1px solid black">
        <thead>
            <th>Days</th>
            <th>8:00-9:00</th>
            <th>9:00-10:00</th>
            <th>10:00-11:00</th>
            <th>11:00-12:00</th>
            <th>12:00-1:00</th>
        </thead>
        <tbody>
            <tr>
                <td><b>Monday</b></td>
                <td>English</td>
                <td>Maths</td>
                <td>Urdu</td>
                <td rowspan="4" style="text-align: center;">Break</td>
                <td>Computer Science</td>
            </tr>
            <tr>
                <td><b>Tuesday</b></td>
                <td>Urdu</td>
                <td>English</td>
                <td>Maths</td>
                <!-- <td>Break</td> -->
                <td rowspan="2" style="text-align: center;">Physics</td>
            </tr>
            <tr>
                <td><b>Wednesday</b></td>
                <td rowspan="3" style="text-align: center;">Maths</td>
                <td>Urdu</td>
                <td>English</td>
                <!-- <td>Break</td> -->
                <!-- <td>Physics</td> -->
            </tr>
            <tr>
                <td><b>Thursday</b></td>
                <!-- <td>Maths</td> -->
                <td>Computer Science</td>
                <td>Urdu</td>
                <!-- <td>Break</td> -->
                <td>English</td>
            </tr>
            <tr>
                <td><b>Friday</b></td>
                <!-- <td>Maths</td> -->
                <td>English</td>
                <td>Physics</td>
                <!-- <td>Break</td> -->
                <td colspan="2" style="text-align: center;">Computer Science</td>
            </tr>

        </tbody>
    </table>
</body>
</html>
