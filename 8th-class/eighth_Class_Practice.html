<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eighth Class Practice about forms</title>
</head>
<body>
    <h1>HTML FORMS</h1>
    <!-- form tag -->
     <!-- what is form tag?
     form tag is used to collect user input. It can contain various types of input elements such as text fields, checkboxes, radio buttons, submit buttons, etc. The form tag also has attributes such as action and method that specify how the form data should be submitted to the server. -->
    <form action="">
        <!-- label and input elements for email type text -->
        <label for="email">Email:</label><br>
        <input type="email" placeholder="example@example.com" id="email" required> <br>

        <!-- label and input elements for password type text -->
        <label for="password">Password:</label> <br>
        <input type="password" placeholder="Enter your password" id="password" required> <br>

        <!-- label and input elements for feedback -->
         <label for="feedback">Feedback:</label> <br>
         <textarea id="feedback" placeholder="Enter your feedback" rows="10" cols="50"></textarea> <br>

        <!--  submit button elements for submit button -->
        <input type="submit" value="Login"><br>

        <!-- login button -->
        <!-- <input type="button" value="Login"><br> -->



    </form>

    
</body>
</html>
